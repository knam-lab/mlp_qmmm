# =========================
# QMMM MLP — Training Config
# =========================

# -------------------------
# Data adapter (reader)
# -------------------------
adapter: charmmmndo97mts            # registered name in a_input_types/charmmmndo97mts.py
input: "data_100ps_39k"             # file/dir/glob understood by adapter

adapter_kwargs:
  max_mm: 3000                      # pad MM arrays up to this size
  workers: 8                        # parallel file parsing
  mp_chunk: 2                       # batch files per worker wave
  compute_deltas: true              # also emit dgrad/espgrad_d targets

  # Energy target selection / transform
  energy_mode: diff_demean          # diff | diff_demean | diff_divmean | diff_zscore | high | low | ...
  energy_target_key: dE             # where the chosen energy target is written

  # Energy outlier filtering (Tukey fences, applied BEFORE stats/transform)
  energy_outlier: true             
  energy_outlier_fence_k: 3.5

  de_outlier: false                 # set true to also Tukey-filter dE
  de_outlier_fence_k: 3.5

  grad_outlier: true
  grad_outlier_fence_k: 3.5
  # By default we check both QM and MM (high/low/delta):
  grad_outlier_keys: [ "qm_grad_high", "qm_grad_low", "qm_dgrad", "mm_grad_high", "mm_grad_low", "mm_dgrad"]
  grad_outlier_metric: mean_l2   # or: max_l2 / median_l2  

  # Mask dummy MM sites: by default zero
  mm_charge_zero_eps: 0.0  # <= this threshold → mm_type := 0

  # Parse summary sidecar files (written BEFORE yielding to training)
  write_summary: True
  summary_json_path: runs/trial1/parse_summary.json # default: <common-dir>/parse_summary.json
  summary_txt_path: runs/trial1/parse_summary.txt  # default: <common-dir>/parse_summary.txt

  verbose: true
  progress_every: 5


# -------------------------
# Species (QM region types)
# All frames should currently have same QM atom count/order (to match channels).
# -------------------------
trainer_species: &species [1, 6, 7, 8]  # H, C, N, O
trainer:
  species: *species

# -------------------------
# Model
# -------------------------
model:
  module: mlp_qmmm.b_nn_types.dp_qmmm_implicit     # Python module path
  class: DeepPotMM                                 # Class name
  # Inputs in the exact forward(...) order:
  inputs: [qm_coords, atom_types, mm_coords, mm_Q, mm_type]

  # Architecture (ensure n_types == len(species))
  descriptor:   { n_types: 4, neuron: [32, 64, 128], axis_neuron: 4 }
  esp:          { n_types: 4, neuron: [8, 16, 32],   axis_neuron: 4 }
  fitting_net:  { n_types: 4, neuron: [256, 256, 256] }

# -------------------------
# Losses & masks
# Types: mse | mae | smoothl1
# -------------------------
losses:
  dE:            { type: mse,      weight: 1.0 }
  qm_dgrad:      { type: mse,      weight: 1.0 }
  mm_espgrad_d:  { type: mse,      weight: 10.0 }  # heavier to stabilize ESP-driven forces
  # mm_dgrad:    { type: mse,      weight: 1.0 }   # enable if your model outputs it

# Mask padded MM sites (mm_type == 1 for real, 0 for pad)
masks:
  mm_*: mm_type

# -------------------------
# Dynamic loss weighting (by LR)
# -------------------------
weight_schedule:
  energy_keys: ["dE", "energy"]
  grad_keys: ["qm_*", "mm_*"]
  w_ene: 1.0
  w_grad_max: 1000.0   # try 100 first #early epochs emphasize gradient-like terms

# Learned-uncertainty weighting (optional)
weighting:
  uncertainty: false
  threshold_gate:
    enabled: true
    units: kcal        # "kcal" or "eV" (default eV)
    # thresholds are per-key (exact or glob), values can be in kcal or eV:
    thresholds:
      dE: 1     # if units: kcal, will auto-convert; else interpret as eV
      qm_dgrad: 1
    metric: rmse       # "rmse" or "mean"
    check_every: 5
    patience: 2
    up_factor: 1.15
    down_factor: 0.85
    hysteresis: 1
    min_w: 0.10
    max_w: 10.0
    ema: 0.3
    use_val: true
    activate_when_any_met: true   # <— only start TGW after ANY key meets threshold
    renorm: true
    activate_when_any_met: true

    deactivate_when_all_met: true
    deactivate_scale: 1.0
    reset_weights_on_deactivate: true
    freeze_after_deactivate: true

# -------------------------
# Optimizer & LR schedule
# -------------------------
optim:
  lr: 5.0e-4
  weight_decay: 0.0
  schedule: mixed                 # options: plateau | onecycle | exponential | mixed
  mixed:
    exp_factor: 0.99              # base exponential decay per epoch
    min_lr: 1.0e-6                # LR floor
    patience: 5                   # bad-epoch tolerance before plateau fallback
    threshold: 1.0e-4             # required absolute improvement to reset patience
    plat_factor: 0.5              # multiplicative LR drop on plateau
    cooldown: 0                   # optional cooldown epochs after a plateau drop

# -------------------------
# Trainer / runtime
# -------------------------
trainer:
  # device: cuda                  # omit to auto-select CUDA-if-available
  dataparallel: false

  # Each frame contributes equally for mm_* terms (recommended)
  mm_equal_frame_weight: true

  # Threads (keep low when GPU-bound)
  torch_num_threads: 1
  torch_interop_threads: 1

  seed: 2

  # DataLoader
  num_workers: 8
  persistent_workers: true
  pin_memory: true

  # Geometry transforms
  center: true
  rot_aug: true
  val_rot_eval: false
  test_rot_eval: false

  # Mixed precision (keep off for portability across GPUs)
  amp: off                       # off | bf16 | fp16

  # Batch/epochs
  batch_size: 32
  epochs: 500

  # Early stopping
  early_stop_patience: 30
  early_stop_min_delta: 1.0e-4

  # Gradient clipping
  grad_clip: 5

  # Splits
  val_fraction: 0.20
  test_fraction: 0.10

  # Output / checkpoint
  out_dir: runs/trial1
  save_script_every: 50
  save_progress: true

  save_path: runs/trial1/best.pt

  # Console printing (metrics remain computed in eV; just printed in kcal/mol)
  print_units: kcal/mol          # eV | kcal/mol
  print_detail: short            # short | full
  print_keys: ["dE","qm_dgrad","mm_espgrad_d"]
